worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;

        location / {
            # Sert les fichiers statiques de l'application React
            # Ces fichiers sont copiés dans l'image Nginx du client
            # et montés dans ce conteneur proxy via un volume ou copiés directement
            # Pour l'approche Docker Compose, les fichiers construits du client
            # seront servis par le conteneur client, et le proxy redirigera vers lui.
            # Cependant, une approche courante est que le proxy serve les statiques.
            # Si le proxy sert les statiques, vous devrez copier les fichiers construits ici.
            # Pour l'instant, nous allons configurer le proxy pour rediriger vers le client.

            # Redirige les requêtes vers le service client
            proxy_pass http://client:80; # 'client' est le nom du service dans docker-compose.yml
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            # Transfère les requêtes API au service backend Django
            proxy_pass http://server:8000; # 'server' est le nom du service dans docker-compose.yml
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Optionnel: Gérer les fichiers statiques de Django si nécessaire (par exemple, l'admin)
        # location /static/admin/ {
        #     alias /app/static/admin/; # Chemin vers les fichiers statiques de l'admin Django dans le conteneur server
        # }
    }
}