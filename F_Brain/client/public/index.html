<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luc-Store - Votre Boutique en Ligne</title>
    <link rel="stylesheet" href="%PUBLIC_URL%/styles.css"> <!-- Lien vers votre fichier CSS -->
</head>
<body>
    <div id="root">
        <!-- L'application React sera rendue ici -->
    </div>

    <h1>Luc-Store</h1> <!-- Titre principal -->

    <div class="article-grid">
        <!-- Les articles seront générés ici par votre composant React ArticleList -->
        <!-- Voici un exemple de structure pour un article -->
        <div class="article-item">
            <h2>Nom de l'Article</h2>
            <div class="article-images">
                <img src="%PUBLIC_URL%/images/produit1_main.jpg" alt="Image principale du produit" class="main-image">
                <div class="thumbnail-images">
                    <img src="%PUBLIC_URL%/images/produit1_thumb1.jpg" alt="Miniature 1" class="thumbnail">
                    <img src="%PUBLIC_URL%/images/produit1_thumb2.jpg" alt="Miniature 2" class="thumbnail">
                </div>
            </div>
            <p class="article-description">Description courte du produit...</p>
            <div class="article-details">
                <p class="stock-info">Stock disponible : 10</p>
                <p class="price">Prix HT : 25.00 €</p>
            </div>
            <!-- Boutons "Éditer" ou "Commander" seront ajoutés par React -->
        </div>
        <!-- Répétez la structure .article-item pour chaque article -->
    </div>

    <!-- Le script de votre application React sera chargé automatiquement par create-react-app -->
</body>
</html>
